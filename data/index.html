<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="css/main.css">
  <script type="text/javascript" src="js/api.js"></script>
  <script type="text/javascript" src="js/settings-store.js"></script>
  <script type="text/javascript" src="js/main.js"></script>
  <script type="text/javascript" src="js/preview.js"></script>
  <title>Shelf Clock</title>
</head>
<body>
  <nav>
    <a href="./index.html">Shelf Clock</a>
    <button title="Expand Navigation">
      <span></span>
    </button>
    <div>
      <ul>
        <li><a href="./index.html" class="active">Home</a></li>
        <li><a href="./settings.html">Settings</a></li>
        <li><a href="./scheduler.html">Alarm Scheduler</a></li>
        <li><a href="./_ac">Setup Wifi</a></li>
        <li><a href="./update">Update Firmware</a></li>
        <li><a href="./updatefs">Update Filesystem</a></li>
        <li><a href="./debug.html">Debug Info</a></li>
      </ul>
    </div>
  </nav>

  <form name="shelfclock-home">
    <section>
      <h2>Live Vorschau</h2>
      <canvas id="ledPreview" class="led-preview"></canvas>
    </section>

    <section>
      <h2>Display Modus</h2>
      <div class="btn-group">
        <input type="button" class="btn btn-blue" data-param="ClockMode" value="Clock">
        <input type="button" class="btn btn-blue" data-param="DateMode" value="Datum">
        <input type="button" class="btn btn-blue" data-param="ScrollingMode" value="Scrolling">
        <input type="button" class="btn btn-grey" data-param="DisplayOffMode" value="Display Off">
      </div>
    </section>

    <section>
      <h2>Spotlights</h2>
      <div class="spot-controls">
        <label><input type="checkbox" name="spotOnOff"> An/Aus</label>
        <input type="color" name="spotColor" value="#e8eeba" title="Feste Farbe w&auml;hlen">
        <input type="button" class="btn btn-blue" data-spotmode="0" value="Feste Farbe">
        <input type="button" class="btn btn-blue" data-spotmode="1" value="Zufall">
        <input type="button" class="btn btn-blue" data-spotmode="2" value="Regenbogen">
        <input type="button" class="btn btn-blue" data-spotmode="3" value="Farbwechsel">
        <input type="button" class="btn btn-blue" data-spotmode="4" value="Funkeln">
      </div>
    </section>

    <section>
      <h2>Timer</h2>
      <div class="timer-inputs">
        <div><label>Hours</label><input type="text" name="hours" value="00"></div>
        <div><label>Minutes</label><input type="text" name="minutes" value="00"></div>
        <div><label>Seconds</label><input type="text" name="seconds" value="00"></div>
      </div>
      <div class="btn-group">
        <input type="button" class="btn btn-red" name="countdown" value="Start Countdown">
        <input type="button" class="btn btn-red" name="stopwatch" value="Start Stopwatch">
      </div>
    </section>

    <section>
      <h2>Scoreboard</h2>
      <div class="score-inputs">
        <div class="score-column">
          <label>Left</label>
          <input type="button" class="btn btn-score-left" name="upleft" value="&uarr;">
          <input type="number" name="left" value="0" min="0" max="99">
          <input type="button" class="btn btn-score-left" name="downleft" value="&darr;">
        </div>
        <div class="score-column">
          <label>Right</label>
          <input type="button" class="btn btn-score-right" name="upright" value="&uarr;">
          <input type="number" name="right" value="0" min="0" max="99">
          <input type="button" class="btn btn-score-right" name="downright" value="&darr;">
        </div>
      </div>
    </section>

    <section>
      <h2>HA Display</h2>
      <div class="score-inputs">
        <div>
          <label>Number (z.B. 19.4 or 1234)</label>
          <input type="number" name="haDisplayValue" value="0" min="0" max="9999" step="0.1" style="width:6rem">
          <label style="margin-left:0.5rem"><input type="checkbox" name="haDisplayDegree" checked> Show &deg;</label>
          <input type="button" class="btn btn-blue" name="haDisplaySend" value="Send">
        </div>
      </div>
    </section>

    <section>
      <h2>Party Games</h2>
      <div class="btn-group">
        <input type="button" class="btn btn-green" data-party="0" value="Dice">
        <input type="button" class="btn btn-green" data-party="1" value="Roulette">
        <input type="button" class="btn btn-green" data-party="2" value="Shot Timer">
        <input type="button" class="btn btn-green" data-party="3" value="Higher/Lower">
      </div>
    </section>

    <section>
      <h2>Lightshow Modes</h2>
      <div class="btn-group">
        <input type="button" class="btn btn-orange" data-lightshow="0" value="Chase">
        <input type="button" class="btn btn-orange" data-lightshow="1" value="Twinkles">
        <input type="button" class="btn btn-orange" data-lightshow="2" value="Rainbow">
        <input type="button" class="btn btn-orange" data-lightshow="3" value="Matrix">
        <input type="button" class="btn btn-orange" data-lightshow="4" value="Rain">
        <input type="button" class="btn btn-orange" data-lightshow="5" value="Fire">
        <input type="button" class="btn btn-orange" data-lightshow="6" value="Snake">
        <input type="button" class="btn btn-orange" data-lightshow="7" value="Cylon">
        <input type="button" class="btn btn-purple" data-lightshow="8" value="Breathing">
        <input type="button" class="btn btn-purple" data-lightshow="9" value="Sparkle">
        <input type="button" class="btn btn-purple" data-lightshow="10" value="Meteor">
        <input type="button" class="btn btn-purple" data-lightshow="11" value="ColorWipe">
        <input type="button" class="btn btn-purple" data-lightshow="12" value="Plasma">
        <input type="button" class="btn btn-orange" data-lightshow="13" value="Random">
        <input type="button" class="btn btn-purple" data-lightshow="14" value="Confetti">
        <input type="button" class="btn btn-purple" data-lightshow="15" value="Juggle">
        <input type="button" class="btn btn-purple" data-lightshow="16" value="Heartbeat">
        <input type="button" class="btn btn-green" data-lightshow="17" value="Pixel Rainbow">
        <input type="button" class="btn btn-green" data-lightshow="18" value="Pixel Wave">
        <input type="button" class="btn btn-green" data-lightshow="19" value="Pixel Fireworks">
        <input type="button" class="btn btn-green" data-lightshow="20" value="Pixel Lights">
        <input type="button" class="btn btn-green" data-lightshow="21" value="Pixel Theater">
        <input type="button" class="btn btn-green" data-lightshow="22" value="Sternenhimmel">
      </div>
    </section>

    <section id="FFT">
      <h2>Spectrum Analyzer</h2>
      <div class="btn-group">
        <input type="button" class="btn btn-green" data-showspectrum="0" value="Bars">
        <input type="button" class="btn btn-green" data-showspectrum="1" value="Peaks">
        <input type="button" class="btn btn-green" data-showspectrum="2" value="Waterfall">
      </div>
    </section>
  </form>
</body>
</html>
